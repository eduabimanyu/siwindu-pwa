name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Frontend Dependencies
        working-directory: ./vue-pwa-frontend
        run: npm install

      - name: Build Vue Project
        working-directory: ./vue-pwa-frontend
        run: npm run build

      - name: Copy Web Assets to Android
        working-directory: ./vue-pwa-frontend
        run: npx cap copy android

      - name: Update Capacitor Android
        working-directory: ./vue-pwa-frontend
        run: npx cap update android

      - name: Build APK
        working-directory: ./vue-pwa-frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ./vue-pwa-frontend/android/app/build/outputs/apk/debug/app-debug.apk
