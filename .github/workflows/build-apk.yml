name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Frontend Dependencies
        working-directory: ./vue-pwa-frontend
        run: npm install

      - name: Build Vue Project
        working-directory: ./vue-pwa-frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./vue-pwa-frontend
        run: npx cap sync android

      - name: Build APK
        working-directory: ./vue-pwa-frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-debug.apk
          path: ./vue-pwa-frontend/android/app/build/outputs/apk/debug/app-debug.apk
